<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitors</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .count {
      font-size: 96px;
      font-weight: 300;
      letter-spacing: -4px;
      line-height: 1;
      color: #111;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .count.visible { opacity: 1; transform: translateY(0); }

    .label {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      opacity: 0;
      transition: opacity 0.5s ease 0.15s;
    }
    .label.visible { opacity: 1; }

    .note {
      margin-top: 48px;
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.4s ease 0.3s;
    }
    .note.visible { opacity: 1; }

    .token-wrap {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .token-wrap.visible { opacity: 1; pointer-events: all; }

    .token-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #bbb;
    }

    .token-row { display: flex; }

    input {
      width: 240px;
      border: 1px solid #e0e0e0;
      border-right: none;
      padding: 8px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #111;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: #111; }
    input::placeholder { color: #ccc; }

    button {
      border: 1px solid #111;
      background: #111;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    button:hover { background: #fff; color: #111; }

    .err {
      font-size: 11px;
      color: #e00;
      min-height: 14px;
    }
  </style>
</head>
<body>

  <div class="count" id="count">—</div>
  <div class="label" id="label">visitors</div>
  <div class="note"  id="note"></div>

  <div class="token-wrap" id="token-wrap">
    <div class="token-label">GitHub token</div>
    <div class="token-row">
      <input type="password" id="token-input" placeholder="ghp_…" />
      <button onclick="saveToken()">Save</button>
    </div>
    <div class="err" id="err"></div>
  </div>

<script>
  // ── config ─────────────────────────────────────
  const REPO = 'Webt/storage';
  const PATH = 'data.json';
  const API  = `https://api.github.com/repos/${REPO}/contents/${PATH}`;
  // ──────────────────────────────────────────────

  const VISITED_KEY = 'visited_webt';
  const TOKEN_KEY   = 'gh_token';

  let token = localStorage.getItem(TOKEN_KEY) || '';
  if (token) document.getElementById('token-input').value = token;

  function show(id)   { document.getElementById(id).classList.add('visible'); }
  function setNote(t) { document.getElementById('note').textContent = t; show('note'); }
  function setErr(t)  { document.getElementById('err').textContent = t; }

  function displayCount(n) {
    document.getElementById('count').textContent = Number(n).toLocaleString();
    show('count');
    show('label');
  }

  function saveToken() {
    token = document.getElementById('token-input').value.trim();
    localStorage.setItem(TOKEN_KEY, token);
    document.getElementById('token-wrap').classList.remove('visible');
    setErr('');
    run();
  }

  async function getFile() {
    const headers = { Accept: 'application/vnd.github+json' };
    if (token) headers.Authorization = `Bearer ${token}`;
    const res  = await fetch(API, { headers });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
    const json = JSON.parse(atob(data.content));
    return { json, sha: data.sha, headers };
  }

  async function writeFile(json, sha, headers) {
    const body = JSON.stringify({
      message: `visitor #${json.visitors}`,
      content: btoa(JSON.stringify(json, null, 2)),
      sha,
    });
    const res  = await fetch(API, {
      method: 'PUT',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  }

  async function run() {
    const alreadyVisited = localStorage.getItem(VISITED_KEY);

    try {
      const { json, sha, headers } = await getFile();
      const current = json.visitors || 0;

      if (alreadyVisited) {
        displayCount(current);
        setNote('you have visited before');
        return;
      }

      if (!token) {
        displayCount(current);
        setNote('add a token to record your visit');
        show('token-wrap');
        return;
      }

      // new visitor — increment and write
      json.visitors = current + 1;

      await writeFile(json, sha, headers);

      localStorage.setItem(VISITED_KEY, '1');
      displayCount(json.visitors);
      setNote('you are visitor #' + json.visitors.toLocaleString());

    } catch (e) {
      document.getElementById('count').textContent = '—';
      show('count');
      setNote(e.message);
      setErr(e.message);
      show('token-wrap');
    }
  }

  run();
</script>
</body>
</html>
