<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitors</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    #count {
      font-size: 96px;
      font-weight: 300;
      letter-spacing: -4px;
      line-height: 1;
      color: #111;
    }

    #label {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
    }

    #note {
      margin-top: 40px;
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.05em;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <div id="count">…</div>
  <div id="label">visitors</div>
  <div id="note"></div>

<script>
  // ── config ─────────────────────────────────────
  const REPO  = 'raeist-user/Webt';
  const PATH  = 'storage/data.json';
  const TOKEN = 'YOUR_GITHUB_TOKEN'; // replace with your token
  // ──────────────────────────────────────────────

  const API         = `https://api.github.com/repos/${REPO}/contents/${PATH}`;
  const VISITED_KEY = 'visited_webt';

  const $count = document.getElementById('count');
  const $note  = document.getElementById('note');

  async function run() {
    try {
      const alreadyVisited = localStorage.getItem(VISITED_KEY);

      const res  = await fetch(API, {
        headers: {
          Accept: 'application/vnd.github+json',
          Authorization: `token ${TOKEN}`,
        }
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const json = JSON.parse(atob(data.content));
      const current = json.visitors || 0;

      if (alreadyVisited) {
        $count.textContent = current.toLocaleString();
        $note.textContent  = 'you have visited before';
        return;
      }

      // new visitor — increment and write back
      json.visitors = current + 1;

      const writeRes = await fetch(API, {
        method: 'PUT',
        headers: {
          Accept: 'application/vnd.github+json',
          Authorization: `token ${TOKEN}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `visitor #${json.visitors}`,
          content: btoa(JSON.stringify(json, null, 2)),
          sha: data.sha,
        }),
      });

      if (!writeRes.ok) {
        const err = await writeRes.json();
        throw new Error(err.message || `write HTTP ${writeRes.status}`);
      }

      localStorage.setItem(VISITED_KEY, '1');
      $count.textContent = json.visitors.toLocaleString();
      $note.textContent  = 'you are visitor #' + json.visitors.toLocaleString();

    } catch (e) {
      $count.textContent = '—';
      $note.textContent  = e.message;
    }
  }

  run();
</script>
</body>
</html>
