<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitors</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .count {
      font-size: 96px;
      font-weight: 300;
      letter-spacing: -4px;
      line-height: 1;
      color: #111;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .count.visible { opacity: 1; transform: translateY(0); }

    .label {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      opacity: 0;
      transition: opacity 0.5s ease 0.15s;
    }
    .label.visible { opacity: 1; }

    .note {
      margin-top: 48px;
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.4s ease 0.3s;
    }
    .note.visible { opacity: 1; }
  </style>
</head>
<body>

  <div class="count" id="count">—</div>
  <div class="label" id="label">visitors</div>
  <div class="note"  id="note"></div>

<script>
  // ── config ─────────────────────────────────────
  const REPO  = 'Webt/storage';
  const PATH  = 'data.json';
  const TOKEN = 'YOUR_GITHUB_TOKEN'; // replace with your token
  // ──────────────────────────────────────────────

  const API         = `https://api.github.com/repos/${REPO}/contents/${PATH}`;
  const VISITED_KEY = 'visited_webt';

  function show(id)   { document.getElementById(id).classList.add('visible'); }
  function setNote(t) { document.getElementById('note').textContent = t; show('note'); }

  function displayCount(n) {
    document.getElementById('count').textContent = Number(n).toLocaleString();
    show('count');
    show('label');
  }

  const headers = {
    Accept: 'application/vnd.github+json',
    Authorization: `Bearer ${TOKEN}`,
  };

  async function run() {
    const alreadyVisited = localStorage.getItem(VISITED_KEY);

    const res  = await fetch(API, { headers });
    const data = await res.json();
    const json = JSON.parse(atob(data.content));
    const current = json.visitors || 0;

    if (alreadyVisited) {
      displayCount(current);
      setNote('you have visited before');
      return;
    }

    // new visitor — increment and write back
    json.visitors = current + 1;

    await fetch(API, {
      method: 'PUT',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `visitor #${json.visitors}`,
        content: btoa(JSON.stringify(json, null, 2)),
        sha: data.sha,
      }),
    });

    localStorage.setItem(VISITED_KEY, '1');
    displayCount(json.visitors);
    setNote('you are visitor #' + json.visitors.toLocaleString());
  }

  run();
</script>
</body>
</html>
