
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap');

        :root { --bg: #ffffff; --main: #000000; --sub: #999999; --border: #eeeeee; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg); color: var(--main);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            margin: 0; user-select: none;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; }

        .music-player-card { 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            background: rgba(128, 128, 128, 0.03); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .player-header { 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        .song-info-click {
            cursor: pointer;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-controls-area {
            max-height: 0; opacity: 0; padding: 0 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .is-expanded .player-controls-area {
            max-height: 130px; opacity: 1; padding: 0 20px 24px 20px;
            pointer-events: auto;
        }

        .progress-wrapper { 
            flex: 1; 
            max-width: 160px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 46px; 
        }

        .custom-slider {
            -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; margin: 0;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--main); cursor: pointer;
        }

        .play-btn-circle {
            width: 46px; height: 46px; border-radius: 50%; background: var(--main); color: var(--bg);
            display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer;
            transition: transform 0.2s;
        }
        .play-btn-circle:active { transform: scale(0.9); }

        .volume-container { position: relative; display: flex; align-items: center; justify-content: center; height: 46px; }
        .volume-popover {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: var(--bg); border: 1px solid var(--border); border-radius: 20px; 
            padding: 12px 8px; height: 100px; display: none; flex-direction: column; z-index: 10;
        }
        .volume-popover.active { display: flex; }
        .vertical-slider { -webkit-appearance: slider-vertical; width: 4px; height: 80px; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 24px; }
        .overlay.active { display: flex; opacity: 1; pointer-events: auto; }
        .song-item { padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .song-item:hover { background: rgba(0,0,0,0.02); }
        
        .header-btn { 
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; 
            opacity: 0.3; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; 
        }
        .header-btn:hover { opacity: 1; }
        .header-btn:active { transform: scale(0.8); }

        .dice-roll {
            animation: roll 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .song-list-scroll { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>

    <audio id="main-audio"></audio>

    <div class="container">
        <div class="music-player-card" id="music-player">
            <!-- Header -->
            <div class="player-header">
                <div class="song-info-click" id="open-library">
                    <span class="text-[0.65rem] uppercase opacity-50 tracking-widest font-bold" id="status-label">Local Mix</span>
                    <span class="text-[1rem] font-semibold truncate" id="song-title">GitHub Library</span>
                    <span class="text-[0.7rem] opacity-40" id="artist-name">Tap to select song</span>
                </div>
                
                <div class="flex items-center gap-1">
                    <div class="header-btn" id="random-btn" title="Shuffle">
                        <i class="fas fa-dice text-lg" id="dice-icon"></i>
                    </div>
                    <div class="header-btn" id="toggle-menu" title="Controls">
                        <i class="fas fa-sliders-h text-lg"></i>
                    </div>
                </div>
            </div>

            <!-- Controls Area -->
            <div class="player-controls-area">
                <div class="flex items-center justify-center gap-6 h-[46px]">
                    <div class="play-btn-circle" id="play-pause-btn">
                        <i class="fas fa-play ml-1" id="play-icon"></i>
                    </div>

                    <div class="progress-wrapper">
                        <input type="range" class="custom-slider" id="progress-bar" value="0" step="0.1">
                        <div class="flex justify-between text-[0.6rem] font-bold opacity-40 mt-1">
                            <span id="time-current">0:00</span>
                            <span id="time-total">0:00</span>
                        </div>
                    </div>

                    <div class="volume-container">
                        <div class="volume-popover" id="volume-popover">
                            <input type="range" class="vertical-slider" id="volume-bar" value="80" max="100">
                        </div>
                        <div class="header-btn !opacity-40 hover:!opacity-100" id="volume-btn">
                            <i class="fas fa-volume-up"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Library Overlay -->
    <div class="overlay" id="playlist-overlay">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-bold">Cloud Library</h2>
                <p class="text-[0.65rem] opacity-40 uppercase tracking-widest">GitHub Hosted Music</p>
            </div>
            <button id="close-overlay" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="song-list-container" class="song-list-scroll"></div>
    </div>
    <script src="script.js"></script>
